<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOFOCA & CIA | Onde o Babado Acontece</title>
    <style>
        :root {
            --bg-paper: #fdf5e6;
            --ink: #2c0000;
            --accent: #b22222;
        }

        * { box-sizing: border-box; }

        body {
            background-color: #e5dec9;
            color: var(--ink);
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 10px;
        }

        .magazine-wrapper {
            background-color: var(--bg-paper);
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            border: 3px double var(--ink);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.3);
            min-height: 100vh;
        }

        header {
            text-align: center;
            border-bottom: 8px double var(--ink);
            margin-bottom: 25px;
            padding-bottom: 10px;
        }

        h1 {
            font-size: clamp(40px, 10vw, 85px);
            color: var(--accent);
            text-transform: uppercase;
            margin: 10px 0;
            font-family: 'Impact', sans-serif;
            letter-spacing: 2px;
        }

        #data-atual {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
        }

        /* GRID: 1 coluna no celular, 2 no tablet, 3 no PC */
        #feed-noticias {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 768px) {
            #feed-noticias { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 1024px) {
            #feed-noticias { grid-template-columns: repeat(3, 1fr); }
            article:first-child { grid-column: span 2; grid-row: span 1; }
        }

        article {
            border-bottom: 1px dashed #999;
            padding-bottom: 15px;
            animation: fadeIn 0.5s ease-in; /* Efeito suave ao trocar de página */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            filter: sepia(0.3) contrast(1.1);
            border: 1px solid var(--ink);
            margin-bottom: 12px;
        }

        .manchete-titulo {
            font-size: 24px;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            line-height: 1.1;
            display: block;
            margin-bottom: 8px;
        }

        .texto-jornal {
            font-size: 16px;
            line-height: 1.4;
            text-align: justify;
        }

        .btn-container {
            text-align: center;
            margin: 40px 0;
            border-top: 2px solid var(--ink);
            padding-top: 20px;
        }

        #btn-proxima {
            background-color: var(--accent);
            color: white;
            padding: 15px 35px;
            font-family: 'Impact', sans-serif;
            font-size: 20px;
            border: none;
            cursor: pointer;
            box-shadow: 5px 5px 0px #000;
            text-transform: uppercase;
        }

        #btn-proxima:hover { background-color: #8b0000; }
        #btn-proxima:active { transform: translate(2px, 2px); box-shadow: 3px 3px 0px #000; }

        footer {
            text-align: center;
            border-top: 4px double var(--ink);
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="magazine-wrapper">
    <header>
        <h1>FOFOCA & CIA</h1>
        <div id="data-atual"></div>
    </header>

    <section id="feed-noticias">
        <p style="text-align:center;">Abrindo os arquivos secretos...</p>
    </section>

    <div class="btn-container">
        <button id="btn-proxima" onclick="proximaPagina()">Virar a Página (Ver mais)</button>
    </div>

    <footer>
        <p>© 2026 FOFOCA & CIA - Onde o mundo se encontra para falar da vida alheia.</p>
    </footer>
</div>

<script src="script.js"></script>

</body>
</html>
